spring:
  application:
    name: rides

  datasource:
    url: jdbc:postgresql://localhost:5432/rides
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway controla o schema; Hibernate só valida
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080